<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel de Admin | Femme Lingerie</title>
  <link rel="icon" type="image/png" href="/favicon.png"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            secondary: "#f7b6bb",
            "on-background": "#e3e2e2",
            outline: "#988e90",
            "surface-container": "#1e2020",
            "surface-container-low": "#1a1c1c",
            background: "#121414",
            primary: "#c6c6c6",
            "on-primary": "#303030",
            "on-primary-fixed": "#1b1b1b",
            "on-primary-fixed-variant": "#474747",
            "on-secondary": "#4d2429",
            "on-secondary-fixed": "#340f15",
            "on-secondary-variant": "#68393e",
            "on-surface": "#e3e2e2",
            "on-surface-variant": "#cfc4c5",
            "on-error": "#690005",
            error: "#ffb4ab"
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="font-sans bg-background text-on-background">
  <!-- Sidebar -->
  <div class="fixed inset-y-0 left-0 w-64 bg-black/60 backdrop-blur-xl flex flex-col p-6 space-y-8">
    <h1 class="text-2xl font-bold text-white">FEMME Admin</h1>
    <nav class="flex flex-col space-y-4">
      <a href="#" class="text-white hover:text-secondary transition-colors">Dashboard</a>
      <a href="#" class="text-white hover:text-secondary transition-colors" id="nav-products">Produtos</a>
      <a href="../produtos.html" class="text-white hover:text-secondary transition-colors">Voltar ao Site</a>
    </nav>
    <button id="admin-logout" class="mt-auto w-full bg-gray-700 text-white py-2 rounded hover:bg-gray-600">Sair</button>
  </div>

  <!-- Main Content -->
  <main class="ml-64 p-8">
    <section id="admin-login" class="max-w-lg mx-auto space-y-4">
      <h2 class="text-3xl font-bold text-white mb-2 text-center">Acesso Admin</h2>
      <label class="block text-white text-sm">Senha (5 dígitos)</label>
      <input type="password" id="admin-pass" maxlength="5" class="w-full p-3 rounded bg-gray-800 text-white text-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary" />
      <button id="admin-login-btn" class="w-full bg-primary text-white py-2 rounded hover:bg-primary/80 transition-colors">Entrar</button>
    </section>

    <section id="admin-panel" class="hidden space-y-6">
      <h2 class="text-2xl font-bold text-white">Gerenciar Produtos</h2>
      <!-- Form -->
      <form id="product-form" class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white/10 backdrop-blur-lg p-4 rounded-xl">
        <input type="text" id="prod-title" placeholder="Título" class="w-full p-2 rounded bg-gray-800 text-white placeholder-gray-400 focus:outline-none" required />
        <input type="number" step="0.01" id="prod-price" placeholder="Preço" class="w-full p-2 rounded bg-gray-800 text-white placeholder-gray-400 focus:outline-none" required />
        <input type="file" id="prod-image" accept="image/*" class="w-full p-2 rounded bg-gray-800 text-white focus:outline-none" required />
        <img id="image-preview" class="hidden w-32 h-32 object-cover rounded" alt="Preview" />
        <textarea id="prod-desc" placeholder="Descrição" class="w-full p-2 rounded bg-gray-800 text-white placeholder-gray-400 focus:outline-none" required></textarea>
        <input type="text" id="prod-category" placeholder="Categoria" class="w-full p-2 rounded bg-gray-800 text-white placeholder-gray-400 focus:outline-none" required />
        <div class="w-full">
          <label class="block text-gray-400 text-xs mb-1">Tamanhos Disponíveis</label>
          <div class="flex gap-2" id="sizes-selector">
            <button type="button" class="size-btn border border-gray-600 rounded w-10 h-10 flex items-center justify-center text-white hover:bg-secondary hover:text-black hover:border-secondary transition-colors" data-size="P">P</button>
            <button type="button" class="size-btn border border-gray-600 rounded w-10 h-10 flex items-center justify-center text-white hover:bg-secondary hover:text-black hover:border-secondary transition-colors" data-size="M">M</button>
            <button type="button" class="size-btn border border-gray-600 rounded w-10 h-10 flex items-center justify-center text-white hover:bg-secondary hover:text-black hover:border-secondary transition-colors" data-size="G">G</button>
            <button type="button" class="size-btn border border-gray-600 rounded w-10 h-10 flex items-center justify-center text-white hover:bg-secondary hover:text-black hover:border-secondary transition-colors" data-size="GG">GG</button>
          </div>
          <input type="hidden" id="prod-sizes" required />
        </div>
        <button type="submit" class="col-span-2 w-full bg-secondary text-white py-2 rounded hover:bg-secondary/80 transition-colors">Adicionar Produto</button>
      </form>

      <!-- Product List -->
      <div id="admin-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    window.db = firebase.firestore();
    window.storage = firebase.storage();
  </script>
  <script src="admin.js"></script>
</body>
</html>
